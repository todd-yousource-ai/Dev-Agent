# Forge CI — generated by Forge Dev Agent
# Languages: {langs_comment}
# Edit this file to customise CI behaviour.
# forge-agent will not overwrite this file once created.

name: Forge CI

on:
  push:
    branches:
      - "{default_branch}"
      - "forge-agent/build/**"
    paths-ignore:
      - "prds/**"
      - "docs/**"
      - "**.md"
      - "**.docx"
  pull_request:
    branches:
      - "{default_branch}"
    paths-ignore:
      - "prds/**"
      - "docs/**"
      - "**.md"
      - "**.docx"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff

      - name: Run tests
        run: |
          if [ -d tests/ ]; then pytest tests/ -v --tb=short; else echo "No tests found"; fi

      - name: Lint check
        run: ruff check src/ --output-format=github || true
        if: always()

      - name: Forge standards check
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -r "api_key\s*=\s*['\"][a-zA-Z0-9]" src/ || (echo "FAIL: possible hardcoded key" && exit 1)
          echo "Standards check passed."
        if: always()
