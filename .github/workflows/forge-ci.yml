# Forge CI — generated by Forge Dev Agent
# Languages: python
# Python/Go/TypeScript/Rust → ubuntu-latest
# Swift → forge-ci-macos.yml (self-hosted Mac runner)

name: Forge CI

on:
  push:
    branches:
      - "main"
      - "forge-agent/build/**"
    paths-ignore:
      - "prds/**"
      - "docs/**"
      - "**.md"
      - "**.docx"
      - "ForgeAgent/**"
      - "*.xcodeproj/**"
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - "prds/**"
      - "docs/**"
      - "**.md"
      - "**.docx"
      - "ForgeAgent/**"
      - "*.xcodeproj/**"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . 2>/dev/null || true; fi
          pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Run Python tests
        run: |
          if [ -d tests/ ] && find tests/ -name "test_*.py" | grep -q .; then
            pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
          else
            echo "No test files found — skipping pytest"
          fi
        if: always()

      - name: Lint (ruff)
        run: |
          if [ -d src/ ] && find src/ -name "*.py" -maxdepth 3 | grep -q .; then
            ruff check src/ --output-format=github
          else
            echo "No Python files in src/ — skipping ruff"
          fi
        if: always()

      - name: Type check (mypy)
        run: |
          if [ -d src/ ] && find src/ -name "*.py" -maxdepth 3 | grep -q .; then
            mypy src/ --ignore-missing-imports --no-error-summary || true
          else
            echo "No Python files in src/ — skipping mypy"
          fi
        if: always()

      - name: Forge standards check
        run: |
          echo "Checking for hardcoded secrets..."
          if [ -d src/ ]; then
            ! grep -r "api_key\s*=\s*['\"][a-zA-Z0-9]" src/ || (echo "FAIL: possible hardcoded key" && exit 1)
          fi
          echo "Standards check passed."
        if: always()
